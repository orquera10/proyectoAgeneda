{% load static %}
<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Panel editor | Agenda</title>
    <link rel="stylesheet" href="{% static 'core/css/auth.css' %}">
</head>
<body>
    <main class="dashboard-page">
        <section class="dashboard-panel">
            <p class="eyebrow">Rol editor</p>
            <h1>Bienvenido, {{ request.user.username }}</h1>
            <p>Este será el espacio para administrar contenidos de la agenda.</p>
            <div class="actions">
                <a class="button-link" href="{% url 'agenda_create' %}">Nueva entrada</a>
                <a class="button-link secondary-link" href="{% url 'agenda_list' %}">Ver agenda</a>
            </div>
            <form method="post" action="{% url 'logout' %}">
                {% csrf_token %}
                <button type="submit" class="secondary">Cerrar sesión</button>
            </form>
        </section>
    </main>
</body>
</html>
